document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r 1fr;gap:1.6rem 2rem\">\n              <div>\n                <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(236,229,218,0.3);margin-bottom:.5rem\">Architecture<\u002Fdiv>\n                <div style=\"font-size:.88rem;font-weight:300;color:rgba(236,229,218,0.72);line-height:1.7\">THGNN-MaGNet pairs a MAGE temporal encoder (BiGRU + SparseMoE + MHA) with a dual hypergraph framework: TCH captures asynchronous lead-lag dependencies via causally masked attention; GPH models market-wide thematic groupings via soft JSD-weighted membership. Trained jointly with a composite IC + MSE + dispersion loss.<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-family:'DM Mono',monospace;font-size:.56rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(236,229,218,0.3);margin-bottom:.5rem\">Multi-Agent Pipeline<\u002Fdiv>\n                <div style=\"font-size:.88rem;font-weight:300;color:rgba(236,229,218,0.72);line-height:1.7\">Six LangGraph agents share a typed state: GNN inference → FinBERT news sentiment → portfolio fusion via tunable α-weighting → risk profiler (beta, ATR, volatility) → macro regime detection (NIFTY 50 trend + India VIX) → research note via Gemma-4-31b. Deployed as a Streamlit app with live NIFTY 500 recommendations.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- P3 -->\n      <div class=\"proj-card\" sc-camel-on-click=\"{{toggle3}}\" role=\"button\" tabindex=\"0\" style=\"cursor:pointer;border-bottom:1px solid rgba(236,229,218,0.08);padding:2.4rem 0;transition:padding-left .4s cubic-bezier(.16,1,.3,1)\">\n        <div class=\"rgrid\" style=\"display:grid;grid-template-columns:1fr auto;gap:0 3rem;align-items:start\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:cen tline:none;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:300;color:#ece5da;caret-color:var(--em);letter-spacing:.04em\">\n      <\u002Fdiv>\n      <ul style=\"list-style:none;margin:0;padding:.4rem 0;max-height:300px;overflow-y:auto\">\n        <sc-for list=\"{{palItems}}\" as=\"it\" hint-placeholder-count=\"0\">\n          <li sc-camel-on-click=\"{{it.run}}\" style=\"{{it.style}}\" data-base-style=\"display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.55rem .95rem;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:300;color:rgba(236,229,218,0.6);cursor:pointer\" style-hover=\"background:rgba(224,86,42,0.08);color:#ece5da\">\n            <span>{{it.label}}<\u002Fspan>\n            <span style=\"font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(236,229,218,0.25);white-space:nowrap\">{{it.hint}}<\u002Fspan>\n          <\u002Fli>\n        <\u002Fsc-for>\n        <sc-if value=\"{{palEmpty}}\" hint-placeholder-val=\"{{false}}\">\n          <li style=\"padding:1rem .95rem;font-family:'Fraunces',serif;font-style:italic;font-size:.85rem;color:rgba(236,229,218,0.3)\">Nothing matches that.<\u002Fli>\n        <\u002Fsc-if>\n      <\u002Ful>\n      <div style=\"display:flex;gap:1.4rem;padding:.55rem .95rem;border-top:1px solid rgba(236,229,218,0.08);font-family:'DM Mono',monospace;font-size:.5rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(236,229,218,0.22)\">\n        <span><b style=\"color:rgba(224,86,42,0.6);font-weight:500\">↑↓<\u002Fb> Navigate<\u002Fspan>\n        <span><b style=\"color:rgba(224,86,42,0.6);font-weight:500\">↵<\u002Fb> Run<\u002Fspan>\n        <span><b style=\"color:rgba(224,86,42,0.6);font-weight:500\">ESC<\u002Fb> Close<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e0562a&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#e0562a&quot;, &quot;#d9a441&quot;, &quot;#b3453a&quot;, &quot;#8a9a5b&quot;], &quot;section&quot;: &quot;Look&quot; },\n  &quot;compact&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Look&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { open: {}, pal: false, q: '', sel: 0 };\n\n  constructor(props) {\n    super(props);\n    this.palRef = React.createRef();\n    const j = (id) => () => this.jump(id);\n    this.commands = [\n      { l: 'Jump — Now',        h: '§ 1', r: j('ch-now') },\n      { l: 'Jump — Experience', h: '§ 2', r: j('ch-exp') },\n      { l: 'Jump — Projects',   h: '§ 3', r: j('ch-proj') },\n      { l: 'Jump — Writing',    h: '§ 4', r: j('ch-notes') },\n      { l: 'Jump — Skills',     h: '§ 5', r: j('ch-skills') },\n      { l: 'Jump — Education',  h: '§ 6', r: j('ch-edu') },\n      { l: 'Jump — Honors',     h: '§ 7', r: j('ch-ach') },\n      { l: 'Jump — Volunteering', h: '§ 8', r: j('ch-vol') },\n      { l: 'Jump — Contact',    h: '§ ∞', r: j('ct') },\n      { l: 'Copy email address', h: 'debarshi2933@gmail.com', r: () => { try { navigator.clipboard.writeText('debarshi2933@gmail.com'); } catch (e) {} this.close(); } },\n      { l: 'Open GitHub',   h: '↗', r: () => { window.open('https://github.com/debarshi29', '_blank'); this.close(); } },\n      { l: 'Open LinkedIn', h: '↗', r: () => { window.open('https://linkedin.com/in/debarshi29', '_blank'); this.close(); } },\n      { l: 'Open Résumé',   h: 'PDF ↗', r: () => { window.open('https://debarshi29.github.io/resume.pdf', '_blank'); this.close(); } },\n      { l: 'Expand all projects',   h: '6 entries', r: () => { this.setState({ open: { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1 } }); this.close(); } },\n      { l: 'Collapse all projects', h: 'reset', r: () => { this.setState({ open: {} }); this.close(); } },\n      { l: 'Back to top', h: '⌂', r: () => { window.scrollTo({ top: 0, behavior: 'smooth' }); this.close(); } }\n    ];\n  }\n\n  jump(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 20, behavior: 'smooth' });\n    this.close();\n  }\n  close() { this.setState({ pal: false, q: '', sel: 0 }); }\n  filtered() {\n    const q = this.state.q.toLowerCase();\n    return this.commands.filter((c) => c.l.toLowerCase().includes(q));\n  }\n  applyVars() {\n    const r = document.documentElement.style;\n    r.setProperty('--em', this.props.accent ?? '#e0562a');\n    r.setProperty('--chpad', (this.props.compact ?? false) ? '3.8rem' : '6.5rem');\n  }\n\n  componentDidMount() {\n    this.applyVars();\n    this.onKey = (e) => {\n      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {\n        e.preventDefault();\n        this.setState((s) => ({ pal: !s.pal, q: '', sel: 0 }));\n        return;\n      }\n      if (!this.state.pal) return;\n      if (e.key === 'Escape') { e.preventDefault(); this.close(); }\n      else if (e.key === 'ArrowDown') { e.preventDefault(); this.setState((s) => ({ sel: Math.min(s.sel + 1, this.filtered().length - 1) })); }\n      else if (e.key === 'ArrowUp') { e.preventDefault(); this.setState((s) => ({ sel: Math.max(s.sel - 1, 0) })); }\n      else if (e.key === 'Enter') { e.preventDefault(); const it = this.filtered()[Math.min(this.state.sel, this.filtered().length - 1)]; if (it) it.r(); }\n    };\n    window.addEventListener('keydown', this.onKey);\n    this.initCursor();\n    this.initReveal();\n    this.initStats();\n    this.initNeurons();\n    this.initProgress();\n  }\n\n  initProgress() {\n    const bar = document.getElementById('em-prog');\n    if (!bar) return;\n    const update = (e) => {\n      let el = e && e.target;\n      if (!el || el === window || el.nodeType === 9) el = document.scrollingElement || document.documentElement;\n      const top = el.scrollTop || 0;\n      const total = (el.scrollHeight || 0) - (el.clientHeight || 0);\n      const p = total > 0 ? Math.min(1, Math.max(0, top / total)) : 0;\n      bar.style.width = (p * 100) + '%';\n    };\n    this.onProgScroll = update;\n    window.addEventListener('scroll', update, { passive: true, capture: true });\n    document.addEventListener('scroll', update, { passive: true, capture: true });\n    window.addEventListener('resize', () => update());\n    update();\n  }\n\n  initNeurons() {\n    const cv = document.getElementById('em-neurons');\n    if (!cv || window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;\n    const ctx = cv.getContext('2d');\n    let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let nodes = [], edges = [];\n    const emRGB = '224,86,42';\n    const build = () => {\n      const r = cv.getBoundingClientRect();\n      W = r.width; H = r.height;\n      cv.width = W * dpr; cv.height = H * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      // scatter neurons, denser toward the top band\n      const count = Math.max(14, Math.min(30, Math.round(W / 62)));\n      nodes = [];\n      for (let i = 0; i < count; i++) {\n        nodes.push({\n          x: Math.random() * W,\n          y: Math.pow(Math.random(), 1.5) * H, // bias upward\n          r: 1.1 + Math.random() * 1.9,\n          base: 0.12 + Math.random() * 0.16,\n          fire: 0,\n          nextFire: performance.now() + 1600 + Math.random() * 7000\n        });\n      }\n      // connect near neighbours\n      edges = [];\n      for (let i = 0; i < nodes.length; i++) {\n        const dist = nodes.map((n, j) => ({ j, d: Math.hypot(n.x - nodes[i].x, n.y - nodes[i].y) }))\n          .filter(o => o.j !== i).sort((a, b) => a.d - b.d).slice(0, 2 + (Math.random() < 0.5 ? 1 : 0));\n        dist.forEach(o => { if (o.d < W * 0.34 && !edges.some(e => (e.a === o.j && e.b === i))) edges.push({ a: i, b: o.j, d: o.d, pulses: [] }); });\n      }\n    };\n    const fire = (i, t) => {\n      nodes[i].fire = 1;\n      edges.forEach(e => {\n        if (e.a === i || e.b === i) e.pulses.push({ t0: t, from: i });\n      });\n    };\n    const draw = (t) => {\n      ctx.clearRect(0, 0, W, H);\n      // edges\n      edges.forEach(e => {\n        const A = nodes[e.a], B = nodes[e.b];\n        ctx.strokeStyle = `rgba(${emRGB},0.07)`;\n        ctx.lineWidth = 1;\n        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();\n        // travelling pulses\n        e.pulses = e.pulses.filter(p => t - p.t0 < 1150);\n        e.pulses.forEach(p => {\n          const prog = (t - p.t0) / 1150;\n          const src = p.from === e.a ? A : B, dst = p.from === e.a ? B : A;\n          const px = src.x + (dst.x - src.x) * prog, py = src.y + (dst.y - src.y) * prog;\n          const g = ctx.createRadialGradient(px, py, 0, px, py, 6);\n          g.addColorStop(0, `rgba(${emRGB},${0.9 * (1 - prog)})`);\n          g.addColorStop(1, `rgba(${emRGB},0)`);\n          ctx.fillStyle = g;\n          ctx.beginPath(); ctx.arc(px, py, 6, 0, 6.29); ctx.fill();\n          // arriving pulse ignites the destination\n          if (prog > 0.96 && dst.fire < 0.5 && Math.random() < 0.22) { dst.fire = 1; }\n        });\n      });\n      // nodes\n      nodes.forEach((n, i) => {\n        if (t > n.nextFire) { fire(i, t); n.nextFire = t + 5200 + Math.random() * 9000; }\n        n.fire *= 0.965;\n        const a = n.base + n.fire * 0.6;\n        if (n.fire > 0.05) {\n          const halo = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 14 * n.fire + n.r);\n          halo.addColorStop(0, `rgba(${emRGB},${0.5 * n.fire})`);\n          halo.addColorStop(1, `rgba(${emRGB},0)`);\n          ctx.fillStyle = halo;\n          ctx.beginPath(); ctx.arc(n.x, n.y, 14 * n.fire + n.r, 0, 6.29); ctx.fill();\n        }\n        ctx.fillStyle = `rgba(${emRGB},${a})`;\n        ctx.beginPath(); ctx.arc(n.x, n.y, n.r + n.fire * 0.8, 0, 6.29); ctx.fill();\n      });\n      this.rafNeuron = requestAnimationFrame(draw);\n    };\n    build();\n    this.onNeuronResize = () => build();\n    window.addEventListener('resize', this.onNeuronResize);\n    this.rafNeuron = requestAnimationFrame(draw);\n  }\n\n  runCount(el) {\n    const raw = el.getAttribute('data-stat') || el.textContent;\n    if (el._counting) cancelAnimationFrame(el._counting);\n    const m = raw.match(/^([^\\d]*)(\\d+(?:\\.\\d+)?)(.*)$/);\n    // skip count-up for ranges (e.g. \"2–4×\") or unparseable — just pulse\n    if (!m || /[–—-]/.test(raw.replace(/^[+\\-]/, ''))) { el.textContent = raw; return; }\n    const prefix = m[1], target = parseFloat(m[2]), suffix = m[3];\n    const decimals = (m[2].split('.')[1] || '').length;\n    const dur = 1100, t0 = performance.now();\n    const ease = (x) => 1 - Math.pow(1 - x, 3);\n    const step = (now) => {\n      const p = Math.min(1, (now - t0) / dur);\n      const v = (target * ease(p)).toFixed(decimals);\n      el.textContent = prefix + v + suffix;\n      if (p < 1) el._counting = requestAnimationFrame(step);\n      else { el.textContent = raw; el._counting = null; }\n    };\n    el._counting = requestAnimationFrame(step);\n  }\n\n  initStats() {\n    const els = Array.from(document.querySelectorAll('.proj-stat'));\n    if (!els.length) return;\n    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    // Replay the count-up whenever the containing card is hovered\n    els.forEach((el) => {\n      const card = el.closest('.proj-card') || el;\n      card.addEventListener('mouseenter', () => { if (el.classList.contains('stat-in')) this.runCount(el); });\n    });\n    if (!('IntersectionObserver' in window) || reduce) {\n      els.forEach((el) => el.classList.add('stat-in'));\n      return;\n    }\n    this.statObs = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) {\n          en.target.classList.add('stat-in');\n          this.runCount(en.target);\n          this.statObs.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.5 });\n    els.forEach((el) => this.statObs.observe(el));\n  }\n\n  initReveal() {\n    const els = Array.from(document.querySelectorAll('.em-reveal'));\n    if (!('IntersectionObserver' in window) || !els.length) { els.forEach(el => el.classList.add('em-in')); return; }\n    this.revObs = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) { en.target.classList.add('em-in'); this.revObs.unobserve(en.target); }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => this.revObs.observe(el));\n  }\n\n  initCursor() {\n    const dot = document.getElementById('em-cur');\n    const ring = document.getElementById('em-cur2');\n    if (!dot || !ring || !window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;\n    let mx = window.innerWidth / 2, my = window.innerHeight / 2;\n    let rx = mx, ry = my, shown = false;\n    const HOVER = 'a,button,[role=\"button\"],input,summary,#hero h1';\n    this.onMove = (e) => {\n      mx = e.clientX; my = e.clientY;\n      dot.style.left = mx + 'px'; dot.style.top = my + 'px';\n      if (!shown) { shown = true; dot.style.opacity = '1'; ring.style.opacity = '1'; }\n      document.body.classList.toggle('em-h', !!(e.target.closest && e.target.closest(HOVER)));\n    };\n    this.onDown = () => document.body.classList.add('em-down');\n    this.onUp = () => document.body.classList.remove('em-down');\n    this.onLeave = () => { shown = false; dot.style.opacity = '0'; ring.style.opacity = '0'; };\n    window.addEventListener('pointermove', this.onMove);\n    window.addEventListener('pointerdown', this.onDown);\n    window.addEventListener('pointerup', this.onUp);\n    document.addEventListener('mouseleave', this.onLeave);\n    const loop = () => {\n      rx += (mx - rx) * 0.16; ry += (my - ry) * 0.16;\n      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';\n      this.rafCur = requestAnimationFrame(loop);\n    };\n    this.rafCur = requestAnimationFrame(loop);\n  }\n  componentDidUpdate(pp) {\n    if (pp.accent !== this.props.accent || pp.compact !== this.props.compact) this.applyVars();\n    if (this.state.pal && this.palRef.current && document.activeElement !== this.palRef.current) this.palRef.current.focus();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this.onKey);\n    if (this.onMove) window.removeEventListener('pointermove', this.onMove);\n    if (this.onDown) window.removeEventListener('pointerdown', this.onDown);\n    if (this.onUp) window.removeEventListener('pointerup', this.onUp);\n    if (this.onLeave) document.removeEventListener('mouseleave', this.onLeave);\n    if (this.rafCur) cancelAnimationFrame(this.rafCur);\n    if (this.revObs) this.revObs.disconnect();\n    if (this.statObs) this.statObs.disconnect();\n    if (this.rafNeuron) cancelAnimationFrame(this.rafNeuron);\n    if (this.onNeuronResize) window.removeEventListener('resize', this.onNeuronResize);\n    if (this.onProgScroll) { window.removeEventListener('scroll', this.onProgScroll, true); document.removeEventListener('scroll', this.onProgScroll, true); window.removeEventListener('resize', this.onProgScroll); }\n  }\n\n  renderVals() {\n    const v = {};\n    for (let i = 1; i <= 6; i++) {\n      v['open' + i] = !!this.state.open[i];\n      v['toggle' + i] = (e) => {\n        if (e && e.target && e.target.closest && e.target.closest('a,button')) return;\n        this.setState((s) => ({ open: { ...s.open, [i]: !s.open[i] } }));\n      };\n      v['sign' + i] = this.state.open[i] ? '—' : '＋';\n      v['exp' + i + 'Style'] = this.state.open[i]\n        ? { overflow: 'hidden', maxHeight: '2600px', opacity: 1, transition: 'max-height .7s cubic-bezier(.16,1,.3,1), opacity .55s ease' }\n        : { overflow: 'hidden', maxHeight: '0px', opacity: 0, transition: 'max-height .5s cubic-bezier(.16,1,
